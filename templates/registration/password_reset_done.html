{% extends 'base.html' %}
{% block title %}Parolni tiklash — BookSaaS{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex" style="background:linear-gradient(135deg,#6366f1,#4f46e5)">
  <div class="m-auto w-100" style="max-width:440px;padding:1rem">
    <div class="card border-0 shadow-lg rounded-4">
      <div class="card-body p-4 p-md-5 text-center">
        <div class="mb-4">
          <div class="mx-auto mb-3 d-flex align-items-center justify-content-center" style="width:64px;height:64px;border-radius:50%;background:#eef2ff">
            <i class="bi bi-envelope-check text-primary fs-3"></i>
          </div>
          <h4 class="fw-bold mb-1">Email yuborildi</h4>
          <p class="text-muted small mb-0">
            Agar email bazamizda mavjud bo'lsa, sizga parolni tiklash havolasi yuborildi.
          </p>
        </div>
        <hr>
        <p class="small text-muted mb-0">
          <a href="{% url 'accounts:login' %}">Kirish sahifasiga qaytish</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
