{% extends 'base.html' %}
{% block title %}Parol yangilandi — BookSaaS{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex" style="background:linear-gradient(135deg,#6366f1,#4f46e5)">
  <div class="m-auto w-100" style="max-width:440px;padding:1rem">
    <div class="card border-0 shadow-lg rounded-4">
      <div class="card-body p-4 p-md-5 text-center">
        <div class="mb-4">
          <div class="mx-auto mb-3 d-flex align-items-center justify-content-center" style="width:64px;height:64px;border-radius:50%;background:#ecfdf5">
            <i class="bi bi-check-circle-fill text-success fs-3"></i>
          </div>
          <h4 class="fw-bold mb-1">Parol yangilandi</h4>
          <p class="text-muted small mb-0">Parolingiz muvaffaqiyatli o'zgartirildi. Endi tizimga kirishingiz mumkin.</p>
        </div>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 py-2">Kirish</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
