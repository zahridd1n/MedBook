{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex" style="background:linear-gradient(135deg,#6366f1,#4f46e5)">
  <div class="m-auto w-100" style="max-width:400px;padding:1rem">
    <div class="card border-0 shadow-lg rounded-4">
      <div class="card-body p-4 p-md-5">
        <h5 class="fw-bold mb-1">Reset Password</h5>
        <p class="text-muted small mb-4">Enter your email and we'll send a reset link.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3"><label class="form-label fw-medium">Email</label>{{ form.email }}</div>
          <button type="submit" class="btn btn-primary w-100 py-2">Send Reset Link</button>
        </form>
        <p class="text-center small mt-3 mb-0"><a href="{% url 'accounts:login' %}">Back to Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
