{% extends 'base.html' %}
{% block title %}New Password{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex" style="background:linear-gradient(135deg,#6366f1,#4f46e5)">
  <div class="m-auto w-100" style="max-width:400px;padding:1rem">
    <div class="card border-0 shadow-lg rounded-4">
      <div class="card-body p-4 p-md-5">
        <h5 class="fw-bold mb-4">Set New Password</h5>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3"><label class="form-label fw-medium">New Password</label>{{ form.password1 }}</div>
          <div class="mb-3"><label class="form-label fw-medium">Confirm</label>{{ form.password2 }}</div>
          {% if form.non_field_errors %}<div class="alert alert-danger py-2">{{ form.non_field_errors.0 }}</div>{% endif %}
          <button type="submit" class="btn btn-primary w-100 py-2">Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
