{% extends 'base_dashboard.html' %}
{% block page_title %}{{ employee.name }} — Ish grafigi{% endblock %}
{% block dashboard_content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="{% url 'employees:list' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h4 class="fw-bold mb-0">{{ employee.name }} — Ish grafigi</h4>
</div>
<div class="row justify-content-center"><div class="col-lg-6">
  <div class="card table-card"><div class="card-body p-4">
    <form method="post">{% csrf_token %}
      <table class="table align-middle">
        <thead><tr><th>Kun</th><th>Ishlaydimi</th><th>Boshlanishi</th><th>Tugashi</th></tr></thead>
        <tbody>
          {% for s in schedules %}
          <tr>
            <td class="fw-medium">{{ s.get_day_display }}</td>
            <td><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="is_working_{{ s.day }}" {% if s.is_working %}checked{% endif %}></div></td>
            <td><input type="time" name="start_{{ s.day }}" class="form-control form-control-sm" value="{{ s.start_time|time:'H:i'|default:'' }}"></td>
            <td><input type="time" name="end_{{ s.day }}" class="form-control form-control-sm" value="{{ s.end_time|time:'H:i'|default:'' }}"></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      <button type="submit" class="btn btn-primary">Jadvalni saqlash</button>
    </form>
  </div></div>
</div></div>
{% endblock %}
